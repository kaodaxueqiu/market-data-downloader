name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            platform: win
          - name: macOS-arm64
            os: macos-latest
            platform: mac
            arch: arm64
            goarch: arm64
            ffi_dir: mac_arm64
          - name: macOS-x64
            os: macos-15-intel
            platform: mac
            arch: x64
            goarch: amd64
            ffi_dir: mac_x64
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: openIM/sdk-cpp/go/go.sum

      # ── 编译 SDK 原生库 ──
      - name: Build SDK dylib (macOS)
        if: matrix.platform == 'mac'
        working-directory: openIM/sdk-cpp/go
        run: |
          echo "Go: $(go version)"
          echo "Building libopenimsdk.dylib for ${{ matrix.arch }} (GOARCH=${{ matrix.goarch }})..."
          CGO_ENABLED=1 GOARCH=${{ matrix.goarch }} \
            go build -buildmode=c-shared -trimpath -ldflags "-s -w" \
            -o _output/libopenimsdk.dylib .
          echo "Build SUCCESS: $(du -h _output/libopenimsdk.dylib | cut -f1)"

      - name: Build SDK DLL (Windows)
        if: matrix.platform == 'win'
        working-directory: openIM/sdk-cpp/go
        shell: bash
        run: |
          echo "Go: $(go version)"
          echo "GCC: $(gcc --version | head -1)"
          CGO_ENABLED=1 go build -buildmode=c-shared -trimpath -ldflags "-s -w" \
            -o _output/libopenimsdk.dll .
          echo "Build SUCCESS: $(du -h _output/libopenimsdk.dll | cut -f1)"

      # ── 构建 IM ──
      - name: Install IM dependencies
        working-directory: openIM/electron-client/app
        run: pnpm install --no-frozen-lockfile
        env:
          HUSKY: "0"

      - name: Build IM frontend (production)
        working-directory: openIM/electron-client/app
        run: pnpm build:packages && pnpm build:prod

      - name: Setup FFI assets (Windows)
        if: matrix.platform == 'win'
        working-directory: openIM/electron-client/app
        run: |
          SDK_OUTPUT="../../sdk-cpp/go/_output"
          TARGET="node_modules/@openim/electron-client-sdk/assets/win_x64"
          mkdir -p "$TARGET"
          cp -f "$SDK_OUTPUT/libopenimsdk.dll" "$TARGET/"
          cp -f "$SDK_OUTPUT/libopenimsdk.h" "$TARGET/"
          ls -lh "$TARGET/"
          echo "Windows FFI assets copied from source build"
        shell: bash

      - name: Setup FFI assets (macOS)
        if: matrix.platform == 'mac'
        working-directory: openIM/electron-client/app
        run: |
          SDK_OUTPUT="../../sdk-cpp/go/_output"
          TARGET="node_modules/@openim/electron-client-sdk/assets/${{ matrix.ffi_dir }}"
          mkdir -p "$TARGET"
          cp -f "$SDK_OUTPUT/libopenimsdk.dylib" "$TARGET/"
          cp -f "$SDK_OUTPUT/libopenimsdk.h" "$TARGET/"
          ls -lh "$TARGET/"
          echo "macOS ${{ matrix.arch }} FFI assets copied from source build"
        shell: bash

      - name: Build IM Electron
        working-directory: openIM/electron-client/app
        run: pnpm electron:build:prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get IM version
        id: im-version
        working-directory: openIM/electron-client/app
        run: echo "version=$(node -p "require('./version.json').prod")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Copy IM to resources (Windows)
        if: matrix.platform == 'win'
        run: |
          mkdir -p resources/im
          cp -r openIM/electron-client/app/release/prod/${{ steps.im-version.outputs.version }}/win-unpacked/* resources/im/
        shell: bash

      - name: Copy IM to resources (macOS)
        if: matrix.platform == 'mac'
        run: |
          mkdir -p resources/im
          IM_VER="${{ steps.im-version.outputs.version }}"
          if [ -d "openIM/electron-client/app/release/prod/${IM_VER}/mac-arm64" ]; then
            cp -r openIM/electron-client/app/release/prod/${IM_VER}/mac-arm64/G-Snowball-IM.app resources/im/
          elif [ -d "openIM/electron-client/app/release/prod/${IM_VER}/mac" ]; then
            cp -r openIM/electron-client/app/release/prod/${IM_VER}/mac/G-Snowball-IM.app resources/im/
          fi
        shell: bash

      # ── 构建量化平台 ──
      - name: Install dependencies
        run: npm install
        
      - name: Build Windows
        if: matrix.platform == 'win'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Build macOS
        if: matrix.platform == 'mac'
        run: npx vue-tsc --noEmit && npx vite build && npx electron-builder --mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          
      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: dist/*.exe
          
      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: dist/*.dmg
          
      - name: Get version from package.json
        id: package-version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash
          
      - name: Release (Windows)
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Release (macOS)
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          files: |
            dist/*.dmg
            dist/*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
