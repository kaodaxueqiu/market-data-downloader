name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      # ── 构建 IM ──
      - name: Install IM dependencies
        working-directory: openIM/electron-client/app
        run: pnpm install --no-frozen-lockfile
        env:
          HUSKY: "0"

      - name: Build IM frontend (production)
        working-directory: openIM/electron-client/app
        run: pnpm build:packages && pnpm build:prod

      - name: Setup FFI assets (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: openIM/electron-client/app
        run: |
          mkdir -p node_modules/@openim/electron-client-sdk/assets/win_x64
          cp -f extraResources/libopenimsdk.dll node_modules/@openim/electron-client-sdk/assets/win_x64/
          cp -f extraResources/libopenimsdk.h node_modules/@openim/electron-client-sdk/assets/win_x64/
          echo "Windows FFI assets copied"
        shell: bash

      - name: Setup FFI assets (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: openIM/electron-client/app
        run: |
          mkdir -p node_modules/@openim/electron-client-sdk/assets/mac_arm64
          cp -f extraResources/mac_arm64/libopenimsdk.dylib node_modules/@openim/electron-client-sdk/assets/mac_arm64/
          cp -f extraResources/mac_arm64/libopenimsdk.h node_modules/@openim/electron-client-sdk/assets/mac_arm64/
          echo "macOS FFI assets copied"
        shell: bash

      - name: Build IM Electron
        working-directory: openIM/electron-client/app
        run: pnpm electron:build:prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Get IM version
        id: im-version
        working-directory: openIM/electron-client/app
        run: echo "version=$(node -p \"require('./version.json').prod\")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Copy IM to resources (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p resources/im
          cp -r openIM/electron-client/app/release/prod/${{ steps.im-version.outputs.version }}/win-unpacked/* resources/im/
        shell: bash

      - name: Copy IM to resources (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p resources/im
          IM_VER="${{ steps.im-version.outputs.version }}"
          if [ -d "openIM/electron-client/app/release/prod/${IM_VER}/mac-arm64" ]; then
            cp -r openIM/electron-client/app/release/prod/${IM_VER}/mac-arm64/G-Snowball-IM.app resources/im/
          elif [ -d "openIM/electron-client/app/release/prod/${IM_VER}/mac" ]; then
            cp -r openIM/electron-client/app/release/prod/${IM_VER}/mac/G-Snowball-IM.app resources/im/
          fi
        shell: bash

      # ── 构建量化平台 ──
      - name: Install dependencies
        run: npm install
        
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: dist/*.exe
          
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          
      - name: Get version from package.json
        id: package-version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash
          
      - name: Release (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Release (macOS)
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          files: |
            dist/*.dmg
            dist/*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
