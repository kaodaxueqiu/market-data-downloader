syntax = "proto3";
package openim.msg;

import "conversation/conversation.proto";
import "sdkws/sdkws.proto";

option go_package = "github.com/openimsdk/protocol/msg";

message MsgDataToMQ {
  string token = 1;
  sdkws.MsgData msgData = 2;
}

message MsgDataToDB {
  sdkws.MsgData msgData = 1;
}

message PushMsgDataToMQ {
  sdkws.MsgData msgData = 1;
  string conversationID = 2;
}

message MsgDataToMongoByMQ {
  int64 lastSeq = 1;
  string conversationID = 2;
  repeated sdkws.MsgData msgData = 3;
}

message GetMaxAndMinSeqReq {
  string UserID = 1;
}
message GetMaxAndMinSeqResp {
  int64 MaxSeq = 1;
  int64 MinSeq = 2;
}

message SendMsgReq {
  sdkws.MsgData msgData = 3;
}

message SendMsgResp {
  string serverMsgID = 1;
  string clientMsgID = 2;
  int64 sendTime = 3;
  sdkws.MsgData modify = 4;
}

message SendSimpleMsgReq {
  sdkws.MsgData msgData = 3;
}

message SendSimpleMsgResp {
  string serverMsgID = 1;
  string clientMsgID = 2;
  int64 sendTime = 3;
  sdkws.MsgData modify = 4;
}


message SetSendMsgStatusReq {
  int32 status = 1;
}

message SetSendMsgStatusResp {}

message GetSendMsgStatusReq {}

message GetSendMsgStatusResp {
  int32 status = 1;
}

message MsgDataToModifyByMQ {
  repeated sdkws.MsgData messages = 1;
  string conversationID = 2;
}

message DelMsgsReq {}

message DelMsgsResp {}

message RevokeMsgReq {
  string conversationID = 1;
  int64 seq = 2;
  string userID = 3;
}

message RevokeMsgResp {}

message MarkMsgsAsReadReq {
  string conversationID = 1;
  repeated int64 seqs = 2;
  string userID = 3;
}

message MarkMsgsAsReadResp {}

message MarkConversationAsReadReq {
  string conversationID = 1;
  string userID = 2;
  int64 hasReadSeq = 3;
  repeated int64 seqs = 4;
}

message MarkConversationAsReadResp {}

message ResetConversationUnreadReq {
  string userID = 1;
  repeated string conversationIDs = 2;
  int64 num = 3;
}

message ResetConversationUnreadResp {}

message SetConversationHasReadSeqReq {
  string conversationID = 1;
  string userID = 2;
  int64 hasReadSeq = 3;
  bool noNotification = 4;
}

message SetConversationHasReadSeqResp {}

message DeleteSyncOpt {
  bool IsSyncSelf = 3;
  bool IsSyncOther = 4;
}

message ClearConversationsMsgReq {
  repeated string conversationIDs = 1;
  string userID = 2;
  DeleteSyncOpt deleteSyncOpt = 3;
}

message ClearConversationsMsgResp {}

message UserClearAllMsgReq {
  string userID = 1;
  DeleteSyncOpt deleteSyncOpt = 3;
}

message UserClearAllMsgResp {}

message DeleteMsgsReq {
  string conversationID = 1;
  repeated int64 seqs = 2;
  string userID = 3;
  DeleteSyncOpt deleteSyncOpt = 4;

  repeated int64 otherSeqs = 50;
}

message DeleteMsgsResp {}

message DeleteMsgPhysicalReq {
  repeated string conversationIDs = 1;
  int64 timestamp = 2;
}

message DeleteMsgPhysicalResp {}

message DeleteMsgPhysicalBySeqReq {
  string conversationID = 1;
  repeated int64 seqs = 2;
}

message DeleteMsgPhysicalBySeqResp {}

message DeleteUserAllMessagesInConvReq{
  string conversationID = 1;
  string userID = 2;
}
message DeleteUserAllMessagesInConvResp{}

message GetMaxSeqsReq {
  repeated string conversationIDs = 1;
}

message GetHasReadSeqsReq {
  string userID = 1;
  repeated string conversationIDs = 2;
}

message SeqsInfoResp {
  map<string, int64> maxSeqs = 1;
}

message GetMsgByConversationIDsReq {
  repeated string conversationIDs = 1;
  map<string, int64> maxSeqs = 2;
}

message GetMsgByConversationIDsResp {
  map<string, sdkws.MsgData> msgDatas = 1;
}

message GetConversationMaxSeqReq {
  string conversationID = 1;
}

message GetConversationMaxSeqResp {
  int64 maxSeq = 1;
}

message GetConversationsHasReadAndMaxSeqReq {
  string userID = 1;
  repeated string conversationIDs = 2;
  bool returnPinned = 3;
}

message Seqs {
  int64 maxSeq = 1;
  int64 hasReadSeq = 2;
  int64 maxSeqTime = 3;
  int64 subtractUnread = 4;
}

message GetConversationsHasReadAndMaxSeqResp {
  map<string, Seqs> seqs = 1;
  repeated string pinnedConversationIDs = 2;
}

message GetActiveUserReq {
  int64 start = 1;
  int64 end = 2;
  bool ase = 3;
  bool group = 4;
  sdkws.RequestPagination pagination = 5;
}

message ActiveUser {
  sdkws.UserInfo user = 1;
  int64 count = 2;
}

message GetActiveUserResp {
  int64 msgCount = 1;
  int64 userCount = 2;
  map<string, int64> dateCount = 3;
  repeated ActiveUser users = 4;
}

message GetActiveGroupReq {
  int64 start = 1;
  int64 end = 2;
  bool ase = 3;
  sdkws.RequestPagination pagination = 4;
}

message ActiveGroup {
  sdkws.GroupInfo group = 1;
  int64 count = 2;
}

message GetActiveGroupResp {
  int64 msgCount = 1;
  int64 groupCount = 2;
  map<string, int64> dateCount = 3;
  repeated ActiveGroup groups = 4;
}

message SearchMessageReq {
  string sendID = 1; // sender ID
  string recvID = 2; // receiver ID
  int32 contentType = 3;
  string sendTime = 4;
  int32 sessionType = 5;
  sdkws.RequestPagination pagination = 6;
}

message SearchChatLog {
  ChatLog chatLog = 1;
  bool isRevoked = 2;
}

message SearchedMsgData {
  sdkws.MsgData msgData = 1;
  bool isRevoked = 2;
}

message SearchMessageResp {
  repeated SearchChatLog chatLogs = 1;
  int32 chatLogsNum = 2;
}

message ChatLog {
  string serverMsgID = 1;
  string clientMsgID = 2;
  string sendID = 3;
  string recvID = 4;
  string groupID = 5;
  string recvNickname = 6;
  int32 senderPlatformID = 7;
  string senderNickname = 8;
  string senderFaceURL = 9;
  string groupName = 10;
  int32 sessionType = 11;
  int32 msgFrom = 12;
  int32 contentType = 13;
  string content = 14;
  int32 status = 15;
  int64 sendTime = 16;
  int64 createTime = 17;
  string ex = 18;
  string groupFaceURL = 19;
  uint32 groupMemberCount = 20;
  int64 seq = 21;
  string groupOwner = 22;
  int32 groupType = 23;
}

message batchSendMessageReq {
  repeated string recvIDList = 1;
  sdkws.MsgData msgData = 2;
  bool isSendAll = 3;
}

message batchSendMessageResp {}
message GetServerTimeReq {}
message GetServerTimeResp {
  int64 serverTime = 1;
}

message ClearMsgReq {
  repeated conversation.Conversation conversations = 1;
}

message ClearMsgResp {}

message MarkGroupMessageReadReq{
  string userID = 1;
  string conversationID = 2;
  map<string, string> clientMsgs = 3; // msgID:sendUserID
}

message MarkGroupMessageReadResp{
  map<string, int32> mark = 1; // 0: already marked 1: newly marked
}

message GetGroupMessageReadNumReq{
  string userID = 1;
  string conversationID = 2;
  repeated string clientMsgIDs = 3;
}

message MessageReadInfo  {
  int64 readNum = 1;
  int64 unreadNum = 2;
}

message GetGroupMessageReadNumResp{
  map<string, MessageReadInfo> num = 1;
}

message GetGroupMessageHasReadReq{
  string conversationID = 1;
  string clientMsgID = 2;
  int32 type = 3; // 0: unread  1: read
  sdkws.RequestPagination pagination = 4;
}

message GroupMessageUserReadTime {
  string userID = 1;
  int64 readTime = 2;
}

message GetGroupMessageHasReadResp{
  int64 count = 1;
  repeated GroupMessageUserReadTime reads = 2;
}



message DestructMsgsReq {
  int64 timestamp = 1;
  int32 limit = 2;
}

message DestructMsgsResp {
  int32 count = 1;
}

message SetUserConversationsMinSeqReq {
  repeated string userIDs = 1;
  string conversationID = 2;
  int64 seq = 3;
}

message SetUserConversationsMinSeqResp {}

message ConversationSeqs {
  string conversationID = 2;
  repeated int64 seqs = 3;
}

message GetSeqMessageReq {
  string userID = 1;
  repeated ConversationSeqs conversations = 2;
  sdkws.PullOrder order = 3;
}

message GetSeqMessageResp {
  map<string, sdkws.PullMsgs> msgs = 1;
  map<string, sdkws.PullMsgs> notificationMsgs = 2;
}

message GetActiveConversationReq {
  repeated string conversationIDs = 1;
  int64 limit = 2;
}

message ActiveConversation {
  string conversationID = 1;
  int64 lastTime = 2;
  int64 maxSeq = 3;
}

message GetActiveConversationResp {
  repeated ActiveConversation conversations = 1;
}

message GetUserActiveConversationReq {
  string userID = 1;
  int64 count = 2;
}

message ActiveConversationWithUnreadCount {
  string conversationID = 1;
  int64 maxMsgTime = 2;
  int64 maxMsgSeq = 3;
  int64 maxNotificationSeq = 4;
  int64 maxNotificationTime = 5;
  int64 readSeq = 6;
  int64 subUnread = 7;
  bool pinned = 8;
}

message ActiveConversationWithUnreadCounts {
    repeated ActiveConversationWithUnreadCount list = 1;
}

message GetUserActiveConversationResp {
  int64 unreadCount = 1;
  repeated ActiveConversationWithUnreadCount conversations = 2;
}

message GetUserActiveConversationAllReq {
  string userID = 1;
}

message GetUserActiveConversationAllResp {
  repeated sdkws.ConversationSyncState conversations = 1;
}

message GetUserConnActiveConversationReq {
  repeated GetUserConnActiveConversationFilter reqs =1;
}

message GetUserConnActiveConversationFilter {
  int64 filterTime = 1;
  int64 skip = 2;
  repeated string conversationIDs = 3;
  int64 count = 4;
  bool hasUnread = 5;
  uint64 currentHash = 6;
  uint64 nextHash = 7;
}


message GetUserConnActiveConversationResult {
  repeated ActiveConversationWithUnreadCount conversations = 1;
  int64 unreadCount = 2;
  int64 leftCount = 3;
  int64 matchCount = 4;
  bool currentHashEqual = 5;
  bool nextHashEqual = 6;
}

message GetUserConnActiveConversationResp {
  repeated GetUserConnActiveConversationResult resp = 1;
}

message MarkUserMessageReadReq {
  string conversationID = 1;
  string userID = 2;
  repeated int64 seqs = 3;
}

message MarkUserMessageReadResp {}

message MarkConversationReadReq {
  string conversationID = 1;
  string userID = 2;
  int64 seq = 3;
}

message MarkConversationReadResp {

}

message AppendStreamMsgReq {
  string conversationID = 1;
  string clientMsgID = 2;
  int64 startIndex = 3;
  repeated string packets = 4;
  bool end = 5;
}

message AppendStreamMsgResp {}

message GetStreamMsgReq {
  string conversationID = 1;
  string clientMsgID = 2;
  int64 seq = 3;
}

message GetStreamMsgResp {
  string userID = 1;
  repeated string packets = 2;
  bool end = 3;
  int64 deadlineTime = 4;
}

message SetUserConversationMaxSeqReq {
  string conversationID = 1;
  repeated string ownerUserID = 2;
  int64 maxSeq = 3;
}
message SetUserConversationMaxSeqResp {}

message SetUserConversationMinSeqReq {
  string conversationID = 1;
  repeated string ownerUserID = 2;
  int64 minSeq = 3;
}
message SetUserConversationMinSeqResp {}

message GetLastMessageSeqByTimeReq {
  string conversationID = 1;
  int64 time = 2;
}

message GetLastMessageSeqByTimeResp {
  int64 seq = 1;
}

message GetLastMessageReq {
  string userID = 1;
  repeated string conversationIDs = 2;
}
message GetLastMessageResp {
  map<string, sdkws.MsgData> msgs = 1;
}

message ModifyMessageReq {
  string conversationID = 1;
  int64 seq = 2;
  string newContent = 3;
  string oldContent = 4;
}

message ModifyMessageResp {
  int64 modifiedTime = 1;
  int64 modifiedCount = 2;
}

message GetConversationsUnreadCountReq {
  string userID = 1;
  repeated string conversationIDs = 2;
}

message GetConversationsUnreadCountResp {
  map<string, int64> unreadCount = 1;
}

message ClearConversationsUnreadCountReq {
  string userID = 1;
  repeated string conversationIDs = 2;
}

message ClearConversationsUnreadCountResp {
  map<string, int64> unreadCount = 1;
}

message GetLatestConversationMetaDataReq {
  string conversationID = 1;
  string userID = 2;
  int64 count = 3;
}

service msg {
  // Get minimum and maximum seq (including user's and specified groups')
  rpc GetMaxSeq(sdkws.GetMaxSeqReq) returns (sdkws.GetMaxSeqResp);
  // Get maximum seq of conversation list
  rpc GetMaxSeqs(GetMaxSeqsReq) returns (SeqsInfoResp);
  // Get maximum read seq of conversation list
  rpc GetHasReadSeqs(GetHasReadSeqsReq) returns (SeqsInfoResp);
  // Get latest messages
  rpc GetMsgByConversationIDs(GetMsgByConversationIDsReq) returns (GetMsgByConversationIDsResp);
  rpc GetConversationMaxSeq(GetConversationMaxSeqReq) returns (GetConversationMaxSeqResp);
  // Pull history messages (including user's and specified groups')
  rpc PullMessageBySeqs(sdkws.PullMessageBySeqsReq) returns (sdkws.PullMessageBySeqsResp);
  rpc GetSeqMessage(GetSeqMessageReq) returns (GetSeqMessageResp);
  rpc SearchMessage(SearchMessageReq) returns (SearchMessageResp);
  // Send message
  rpc SendMsg(SendMsgReq) returns (SendMsgResp);
  // Batch send message (async)
  rpc BatchSendMessage(batchSendMessageReq) returns (batchSendMessageResp);
  // Send simple message
  rpc SendSimpleMsg(SendSimpleMsgReq) returns (SendSimpleMsgResp);

  rpc SetUserConversationsMinSeq(SetUserConversationsMinSeqReq) returns (SetUserConversationsMinSeqResp);

  // Clear all messages in specified conversation, reset min seq to max seq + 1
  rpc ClearConversationsMsg(ClearConversationsMsgReq) returns (ClearConversationsMsgResp);
  // Delete all user messages, reset min seq to max seq + 1
  rpc UserClearAllMsg(UserClearAllMsgReq) returns (UserClearAllMsgResp);
  // User marks deletion of partial messages by Seq
  rpc DeleteMsgs(DeleteMsgsReq) returns (DeleteMsgsResp);
  // Physically delete messages by seq
  rpc DeleteMsgPhysicalBySeq(DeleteMsgPhysicalBySeqReq) returns (DeleteMsgPhysicalBySeqResp);
  // Physically delete messages by time
  rpc DeleteMsgPhysical(DeleteMsgPhysicalReq) returns (DeleteMsgPhysicalResp);
  // delete user all message in a conversation
  rpc DeleteUserAllMessagesInConv(DeleteUserAllMessagesInConvReq) returns (DeleteUserAllMessagesInConvResp);

  // Set whether message is sent successfully - for messages sent via API
  rpc SetSendMsgStatus(SetSendMsgStatusReq) returns (SetSendMsgStatusResp);
  // Get message send status
  rpc GetSendMsgStatus(GetSendMsgStatusReq) returns (GetSendMsgStatusResp);
  rpc RevokeMsg(RevokeMsgReq) returns (RevokeMsgResp);
  // mark as read
  rpc MarkMsgsAsRead(MarkMsgsAsReadReq) returns (MarkMsgsAsReadResp);
  rpc MarkConversationAsRead(MarkConversationAsReadReq) returns (MarkConversationAsReadResp);
  rpc SetConversationHasReadSeq(SetConversationHasReadSeqReq) returns (SetConversationHasReadSeqResp);

  rpc GetConversationsHasReadAndMaxSeq(GetConversationsHasReadAndMaxSeqReq) returns (GetConversationsHasReadAndMaxSeqResp);
  rpc GetActiveUser(GetActiveUserReq) returns (GetActiveUserResp);
  rpc GetActiveGroup(GetActiveGroupReq) returns (GetActiveGroupResp);
  rpc GetServerTime(GetServerTimeReq) returns (GetServerTimeResp);

  rpc ClearMsg(ClearMsgReq) returns (ClearMsgResp);
  rpc MarkGroupMessageRead(MarkGroupMessageReadReq) returns(MarkGroupMessageReadResp);
  rpc GetGroupMessageReadNum(GetGroupMessageReadNumReq) returns(GetGroupMessageReadNumResp);
  rpc GetGroupMessageHasRead(GetGroupMessageHasReadReq) returns(GetGroupMessageHasReadResp);

  rpc DestructMsgs(DestructMsgsReq) returns (DestructMsgsResp);

  rpc GetActiveConversation(GetActiveConversationReq) returns (GetActiveConversationResp);

  rpc MarkUserMessageRead(MarkUserMessageReadReq) returns (MarkUserMessageReadResp);
  rpc MarkConversationRead(MarkConversationReadReq) returns (MarkConversationReadResp);

  rpc AppendStreamMsg(AppendStreamMsgReq) returns (AppendStreamMsgResp);
  rpc GetStreamMsg(GetStreamMsgReq) returns (GetStreamMsgResp);

  rpc SetUserConversationMaxSeq(SetUserConversationMaxSeqReq) returns (SetUserConversationMaxSeqResp);
  rpc SetUserConversationMinSeq(SetUserConversationMinSeqReq) returns (SetUserConversationMinSeqResp);
  rpc GetLastMessageSeqByTime(GetLastMessageSeqByTimeReq) returns (GetLastMessageSeqByTimeResp);
  rpc GetLastMessage(GetLastMessageReq) returns (GetLastMessageResp);

  rpc ModifyMessage(ModifyMessageReq) returns (ModifyMessageResp);

  rpc GetConversationsUnreadCount(GetConversationsUnreadCountReq) returns (GetConversationsUnreadCountResp);
  rpc ClearConversationsUnreadCount(ClearConversationsUnreadCountReq) returns (ClearConversationsUnreadCountResp);

  rpc GetUserActiveConversation(GetUserActiveConversationReq) returns (GetUserActiveConversationResp);

  rpc GetUserActiveConversationAll(GetUserActiveConversationAllReq) returns (GetUserActiveConversationAllResp);

  rpc ResetConversationUnread(ResetConversationUnreadReq) returns (ResetConversationUnreadResp);
}
