syntax = "proto3";
package openim.third;

import "sdkws/sdkws.proto";

option go_package = "github.com/openimsdk/protocol/third";

message KeyValues {
  string key = 1;
  repeated string values = 2;
}

message SignPart {
  int32 partNumber = 1;
  string url = 2;
  repeated KeyValues query = 3;
  repeated KeyValues header = 4;
}

message AuthSignParts {
  string url = 1;
  repeated KeyValues query = 2;
  repeated KeyValues header = 3;
  repeated SignPart parts = 4;
}

message PartLimitReq {}

message PartLimitResp {
  int64 minPartSize = 1;
  int64 maxPartSize = 2;
  int32 maxNumSize = 3;
}

message PartSizeReq {
  int64 size = 1;
}

message PartSizeResp {
  int64 size = 2;
}

message InitiateMultipartUploadReq {
  string hash = 1;
  int64 size = 2;
  int64 partSize = 3;
  int32 maxParts = 4;
  string cause = 5;
  string name = 6;
  string contentType = 7;
  string urlPrefix = 8;
}

message UploadInfo {
  string uploadID = 1;
  int64 partSize = 2;
  AuthSignParts sign = 3;
  int64 expireTime = 4;
}

message InitiateMultipartUploadResp {
  string url = 1;
  UploadInfo upload = 2;
}

message AuthSignReq {
  string uploadID = 1;
  repeated int32 partNumbers = 2;
}

message AuthSignResp {
  string url = 1;
  repeated KeyValues query = 2;
  repeated KeyValues header = 3;
  repeated SignPart parts = 4;
}

message CompleteMultipartUploadReq {
  string uploadID = 1;
  repeated string parts = 2;
  string name = 3;
  string contentType = 4;
  string cause = 5;
  string urlPrefix = 6;
}

message CompleteMultipartUploadResp {
  string url = 1;
}

message AccessURLReq {
  string name = 1;
  map<string, string> query = 2;
}

message AccessURLResp {
  string url = 1;
  int64 expireTime = 2;
}

message InitiateFormDataReq {
  string name = 1;
  int64 size = 2;
  string contentType = 3;
  string group = 4;
  int64 millisecond = 5;
  bool absolute = 6;
}

message InitiateFormDataResp {
  string id = 1;
  string url = 2;
  string file = 3;
  repeated KeyValues header = 4;
  map<string, string> formData = 5;
  int64 expires = 6;
  repeated int32 successCodes = 7;
}

message CompleteFormDataReq {
  string id = 1;
  string urlPrefix = 2;
}

message CompleteFormDataResp {
  string url = 1;
}

message DeleteOutdatedDataReq {
  int64 expireTime = 1;
  repeated string objectGroup = 2;
  int32 limit = 3;
}

message DeleteOutdatedDataResp {
  int32 count = 1;
}

message FcmUpdateTokenReq {
  int32 platformID = 1;
  string fcmToken = 2;
  string account = 3;
  int64 expireTime = 4;
}

message FcmUpdateTokenResp {}

message SetAppBadgeReq {
  string userID = 1;
  int32 appUnreadCount = 2;
}

message SetAppBadgeResp {}

message fileURL {
  string filename = 1;
  string URL = 2;
}

message UploadLogsReq {
  int32 platform = 1;
  repeated fileURL fileURLs = 2;
  string appFramework = 3;
  string version = 5;
  string ex = 4;
}

message UploadLogsResp {}

message DeleteLogsReq {
  repeated string logIDs = 1;
}

message DeleteLogsResp {}

message SearchLogsReq {
  string keyword = 1;
  int64 startTime = 2;
  int64 endTime = 3;
  sdkws.RequestPagination pagination = 4;
}

message LogInfo {
  string userID = 1;
  string platform = 2;
  string url = 3;
  int64 createTime = 4;
  string nickname = 5;
  string logID = 6;
  string filename = 7;
  string systemType = 8;
  string ex = 9;
  string version = 10;
}

message SearchLogsResp {
  repeated LogInfo logsInfos = 1;
  uint32 total = 2;
}

message TimerTaskCallbackConfig {
  string callbackMethod = 1;
  string callbackPayload = 2;
}

message TimerTask {
  string taskID = 1;
  string taskName = 2;
  string taskCategory = 3;
  string srcUserID = 4;
  int64 executeAt = 5;
  int64 executeBefore = 6;
  int64 maxRetry = 7;
  TimerTaskCallbackConfig callbackConfig = 8;
  int64 createdAt = 9;
  int64 updatedAt = 10;
  string dedupKey = 11;
}

message CreateTimerTaskReq {
  string taskName = 1;
  string taskCategory = 2;
  int64 executeAt = 3;
  int64 executeBefore = 4;
  int64 maxRetry = 5;
  TimerTaskCallbackConfig callbackConfig = 6;
  string userID = 7;
  string dedupKey = 8;
}

message CreateTimerTaskResp {
  TimerTask task = 1;
}

message UpdateTimerTaskReq {
  string taskID = 1;
  optional string taskName = 2;
  optional string taskCategory = 3;
  optional int64 executeAt = 4;
  optional int64 executeBefore = 5;
  optional int64 maxRetry = 6;
  optional TimerTaskCallbackConfig callbackConfig = 7;
  string userID = 8;
}

message UpdateTimerTaskResp {}

message GetTimerTaskReq {
  string taskID = 1;
  string userID = 2;
}

message GetTimerTaskResp {
  TimerTask task = 1;
}

message DeleteTimerTaskReq {
  string taskID = 1;
  string userID = 2;
}

message DeleteTimerTaskResp {}

message ListTimerTasksReq {
  int64 pageCount = 1;
  int64 pageSize = 2;
  string userID = 3;
  repeated string categories = 4;
}

message ListTimerTasksResp {
  repeated TimerTask tasks = 1;
}

message GetASRCapabilitiesReq {
}

message GetASRCapabilitiesResp {
  repeated string format = 1;
  repeated float sampleRateHz = 2;
  int64 maxRecordTimeMs = 3;
  int64 maxFileSize = 4;
  string provider = 5;
  string requestType = 6;
  bool crossDomain = 7;
}

message GetASRTranscriptionURLReq {
}

message GetASRTranscriptionURLResp {
  string url = 1;
  string method = 2;
  map<string, string> header = 3;
  int64 expireTime = 4;
  string provider = 5;
  string requestType = 6;
  int32 responseSuccessCode = 7;
  string responseResultField = 8;
  string responseStatusField = 9;
  string responseSuccessValue = 10;
  bool crossDomain = 11;
}

message GetASRRecognitionURLReq {
  string url = 1;
}

message GetASRRecognitionURLResp {
  string text = 1;
}

service third {
  rpc PartLimit(PartLimitReq) returns (PartLimitResp);
  rpc PartSize(PartSizeReq) returns (PartSizeResp);
  rpc InitiateMultipartUpload(InitiateMultipartUploadReq) returns (InitiateMultipartUploadResp);
  rpc AuthSign(AuthSignReq) returns (AuthSignResp);
  rpc CompleteMultipartUpload(CompleteMultipartUploadReq) returns (CompleteMultipartUploadResp);
  rpc AccessURL(AccessURLReq) returns (AccessURLResp);
  rpc InitiateFormData(InitiateFormDataReq) returns (InitiateFormDataResp);
  rpc CompleteFormData(CompleteFormDataReq) returns (CompleteFormDataResp);
  rpc DeleteOutdatedData(DeleteOutdatedDataReq) returns (DeleteOutdatedDataResp);

  rpc FcmUpdateToken(FcmUpdateTokenReq) returns (FcmUpdateTokenResp);
  rpc SetAppBadge(SetAppBadgeReq) returns (SetAppBadgeResp);

  // Logs
  rpc UploadLogs(UploadLogsReq) returns (UploadLogsResp);
  rpc DeleteLogs(DeleteLogsReq) returns (DeleteLogsResp);
  rpc SearchLogs(SearchLogsReq) returns (SearchLogsResp);

  // Timer
  rpc CreateTimerTask(CreateTimerTaskReq) returns (CreateTimerTaskResp);
  rpc UpdateTimerTask(UpdateTimerTaskReq) returns (UpdateTimerTaskResp);
  rpc GetTimerTask(GetTimerTaskReq) returns (GetTimerTaskResp);
  rpc DeleteTimerTask(DeleteTimerTaskReq) returns (DeleteTimerTaskResp);
  rpc ListTimerTasks(ListTimerTasksReq) returns (ListTimerTasksResp);

  // Speech to text
  rpc GetASRCapabilities(GetASRCapabilitiesReq) returns (GetASRCapabilitiesResp);
  rpc GetASRTranscriptionURL(GetASRTranscriptionURLReq) returns (GetASRTranscriptionURLResp);
  rpc GetASRRecognitionURL(GetASRRecognitionURLReq) returns (GetASRRecognitionURLResp);
}
